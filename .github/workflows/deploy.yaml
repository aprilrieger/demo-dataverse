# In-repo deploy: checkout → kubeconfig → envsubst → bin/helm_deploy.
# Container image comes from chart defaults + ops/<environment>-deploy.yaml (not ghcr.io/<this repo>).
name: Deploy
run-name: Deploy (${{ github.ref_name }} -> ${{ inputs.environment }}) by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target (must match ops/<name>-deploy.tmpl.yaml and a GitHub Environment)
        required: true
        type: choice
        default: besties
        options:
          - besties
      debug_enabled:
        description: Open an interactive tmate session on the runner before deploy
        required: false
        type: boolean
        default: false
      k8s_release_name:
        description: Helm release name (leave blank for <repo>-<environment>)
        required: false
        type: string
      k8s_namespace:
        description: Kubernetes namespace (leave blank for <repo>-<environment>)
        required: false
        type: string
      run_bootstrap_job:
        description: Apply a one-shot configbaker Job (bootstrap.sh dev) — use after empty DB; deletes any prior …-bootstrap-once job first
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: dtzar/helm-kubectl:3.9.4
    environment: ${{ inputs.environment }}
    env:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      SOLR_ADMIN_USER: ${{ secrets.SOLR_ADMIN_USER }}
      SOLR_ADMIN_PASSWORD: ${{ secrets.SOLR_ADMIN_PASSWORD }}
      HELM_EXPERIMENTAL_OCI: 1
      HELM_EXTRA_ARGS: --values ops/${{ inputs.environment }}-deploy.yaml
      KUBECONFIG: ./kubeconfig.yml
      KUBECONFIG_FILE: ${{ secrets.KUBECONFIG_FILE }}
    steps:
      # Local actions under ./.github/actions/* are not on disk until checkout runs — checkout must be first.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: github.event_name == 'workflow_dispatch' && inputs.debug_enabled
        with:
          limit-access-to-actor: true

      - name: Deploy with Helm
        run: |
          set -e
          echo "$KUBECONFIG_FILE" | base64 -d > "$KUBECONFIG"
          DOLLAR=$ envsubst < "ops/${{ inputs.environment }}-deploy.tmpl.yaml" > "ops/${{ inputs.environment }}-deploy.yaml"
          REL='${{ inputs.k8s_release_name }}'
          NS='${{ inputs.k8s_namespace }}'
          if [ -z "$REL" ]; then REL="${{ github.event.repository.name }}-${{ inputs.environment }}"; fi
          if [ -z "$NS" ]; then NS="${{ github.event.repository.name }}-${{ inputs.environment }}"; fi
          chmod +x bin/helm_deploy
          ./bin/helm_deploy "$REL" "$NS"

      - name: One-shot configbaker bootstrap Job
        if: github.event_name == 'workflow_dispatch' && inputs.run_bootstrap_job
        run: |
          set -e
          echo "$KUBECONFIG_FILE" | base64 -d > "$KUBECONFIG"
          DOLLAR=$ envsubst < "ops/${{ inputs.environment }}-deploy.tmpl.yaml" > "ops/${{ inputs.environment }}-deploy.yaml"
          REL='${{ inputs.k8s_release_name }}'
          NS='${{ inputs.k8s_namespace }}'
          if [ -z "$REL" ]; then REL="${{ github.event.repository.name }}-${{ inputs.environment }}"; fi
          if [ -z "$NS" ]; then NS="${{ github.event.repository.name }}-${{ inputs.environment }}"; fi
          JOB="${REL}-bootstrap-once"
          kubectl -n "$NS" delete job "$JOB" --ignore-not-found=true
          helm template "$REL" ./charts/demo-dataverse \
            --namespace "$NS" \
            $HELM_EXTRA_ARGS \
            --show-only templates/bootstrap-job.yaml \
            --set bootstrapJob.enabled=true \
            --set bootstrapJob.helmHook=false \
            | kubectl apply -f -
          kubectl -n "$NS" wait --for=condition=complete "job/$JOB" --timeout=25m
          kubectl -n "$NS" logs "job/$JOB"
