# Helm values for the "besties" GitHub Environment (staging / shared demo).
#
# This file uses envsubst: every $VAR below must be exported (or use ../ops/render-besties-deploy.sh).
# Required:
#   export DB_PASSWORD='...'              # Postgres (DATAVERSE_DB_* / POSTGRES_* / PGPASSWORD)
#   export DOLLAR='$'                     # Keeps literal $ for any $-prefixed YAML if needed later
# Solr HTTP basic auth: same GitHub Environment secrets for Dataverse env *and* solrInit (envsubst).
#   export SOLR_ADMIN_USER='...'
#   export SOLR_ADMIN_PASSWORD='...'      # if password contains @ : # etc., URL-encode or Solr URLs may break
# Then:
#   envsubst < ops/besties-deploy.tmpl.yaml > ops/besties-deploy.yaml
#
# GitHub Actions: SOLR_ADMIN_USER / SOLR_ADMIN_PASSWORD (job env → envsubst → Helm values, including solrInit).
# solrInit.zkConnect is literal below (edit for your ZK DNS + chroot).
# If Solr has no basic auth: set both secrets empty and change Solr URL values + solrInit admin fields to drop user:pass@.
#
# Before first deploy with solrInit: Solr conf ConfigMap — see ops/solr-init-setup.md .

awsS3:
  enabled: true
  # Name of a Secret you create out-of-band (keys = secretKeys below).
  existingSecret: "aws-s3-credentials"
  bucketName: "demo-dataverse"
  endpointUrl: "https://s3.us-west-2.amazonaws.com"
  # Must match the profile section in mounted .aws/credentials (e.g. [default]); override in values if needed.
  profile: default
  secretKeys:
    credentials: credentials
    config: config

replicaCount: 1

# Docker Hub tag (not bare 6.10.1). Keeps deploy values explicit so Helm release history cannot stick to a bad tag.
image:
  repository: gdcc/dataverse
  tag: "6.10.1-noble-r0"

resources:
  limits:
    memory: 4Gi
    cpu: "1000m"
  requests:
    memory: 2Gi
    cpu: 100m

ingress:
  enabled: true
  className: nginx-ingress
  annotations:
    nginx.org/client-max-body-size: "0"
    cert-manager.io/cluster-issuer: letsencrypt-production-dns
  hosts:
    - host: demo-dataverse.notch8.cloud
      paths:
        - path: /
          pathType: Prefix
    - host: "*.demo-dataverse.notch8.cloud"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - demo-dataverse.notch8.cloud
        - "*.demo-dataverse.notch8.cloud"
      secretName: demo-dataverse-tls

# Upload Dataverse Solr configset to ZK + create collection "dataverse" before Payara starts (see ops/solr-init-setup.md).
solrInit:
  enabled: true
  image: bitnamilegacy/solr:8.11.2-debian-11-r50
  imagePullPolicy: IfNotPresent
  # Same hosts as SOLR_ZK_HOSTS + Bitnami ZK chroot /solr (omit /solr only if your Solr chart uses no chroot).
  zkConnect: "solr-zookeeper-0.solr-zookeeper-headless.solr.svc.cluster.local:2181,solr-zookeeper-1.solr-zookeeper-headless.solr.svc.cluster.local:2181,solr-zookeeper-2.solr-zookeeper-headless.solr.svc.cluster.local:2181/solr"
  solrHttpBase: "http://solr.solr.svc.cluster.local:8983"
  collection: dataverse
  configSetName: dataverse_config
  numShards: 1
  replicationFactor: 2
  confConfigMap: dataverse-besties-solr-conf
  # Same creds as extraEnvVars Solr URLs (envsubst); no separate init Secret.
  existingSecret: ""
  adminUser: "${SOLR_ADMIN_USER}"
  adminPassword: "${SOLR_ADMIN_PASSWORD}"
  resources: {}

# Payara/Dataverse — external Postgres + Solr. Create DB + role on the server first (quoted names if hyphenated);
# see ops/kubernetes-deploy-checklist.md — error "database \"demo-dataverse\" does not exist" means DB not created.
extraEnvVars:
  - name: DATAVERSE_DB_HOST
    value: acid-postgres-cluster-delta.postgres.svc.cluster.local
  - name: DATAVERSE_DB_USER
    value: demo-dataverse
  - name: DATAVERSE_DB_PASSWORD
    value: $DB_PASSWORD
  - name: DATAVERSE_DB_NAME
    value: "demo-dataverse"
  - name: POSTGRES_SERVER
    value: acid-postgres-cluster-delta.postgres.svc.cluster.local
  - name: POSTGRES_PORT
    value: "5432"
  - name: POSTGRES_DATABASE
    value: demo-dataverse
  - name: POSTGRES_USER
    value: demo-dataverse
  - name: POSTGRES_PASSWORD
    value: $DB_PASSWORD
  - name: PGPASSWORD
    value: $DB_PASSWORD
  # Solr (same SOLR_ADMIN_* as solrInit; YAML anchor dedupes identical host:port lines).
  - name: SOLR_SERVICE_HOST
    value: &solr_host_colon_port "${SOLR_ADMIN_USER}:${SOLR_ADMIN_PASSWORD}@solr.solr.svc.cluster.local:8983"
  - name: SOLR_SERVICE_PORT
    value: "8983"
  - name: SOLR_LOCATION
    value: *solr_host_colon_port
  - name: DATAVERSE_SOLR_HOST
    value: "${SOLR_ADMIN_USER}:${SOLR_ADMIN_PASSWORD}@solr.solr.svc.cluster.local"
  - name: DATAVERSE_SOLR_PORT
    value: "8983"
  # Core name (dataverse.solr.core); Solr must have this core + Dataverse schema.
  - name: DATAVERSE_SOLR_CORE
    value: dataverse
  - name: DATAVERSE_URL
    value: https://demo-dataverse.notch8.cloud
  - name: DATAVERSE_SERVICE_HOST
    value: demo-dataverse.notch8.cloud
  - name: hostname
    value: demo-dataverse.notch8.cloud
  - name: JVM_OPTS
    value: "-Xmx2g -Xms2g"
  - name: DATAVERSE_PID_PROVIDERS
    value: demo
  - name: DATAVERSE_PID_DEFAULT_PROVIDER
    value: demo
  - name: DATAVERSE_PID_DEMO_TYPE
    value: FAKE
  - name: DATAVERSE_PID_DEMO_LABEL
    value: demo
  - name: DATAVERSE_PID_DEMO_AUTHORITY
    value: "10.5072"
  - name: DATAVERSE_PID_DEMO_SHOULDER
    value: FK2/
  - name: INIT_SCRIPTS_FOLDER
    value: /opt/payara/init.d
