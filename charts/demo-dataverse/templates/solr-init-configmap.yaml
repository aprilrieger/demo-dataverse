{{- if .Values.solrInit.enabled }}
{{- if not .Values.solrInit.zkConnect }}{{ fail "solrInit.zkConnect is required when solrInit.enabled" }}{{- end }}
{{- if not .Values.solrInit.confConfigMap }}{{ fail "solrInit.confConfigMap is required when solrInit.enabled (ConfigMap with Dataverse solr conf files)" }}{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "demo-dataverse.fullname" . }}-solr-init-script
  labels:
    {{- include "demo-dataverse.labels" . | nindent 4 }}
data:
  solr-init.sh: |
    #!/bin/bash
    set -euo pipefail
    # SolrCloud: upload Dataverse configset to ZK, then create collection if missing.
    SOLR_BIN="${SOLR_BIN:-/opt/bitnami/solr/bin/solr}"
    ZK="${SOLR_ZK_CONNECT:?set solrInit.zkConnect}"
    CONF_DIR="${SOLR_CONF_DIR:-/solr-conf}"
    COLLECTION="${SOLR_COLLECTION:-dataverse}"
    CONFIGSET="${SOLR_CONFIGSET_NAME:-dataverse_config}"
    BASE="${SOLR_HTTP_BASE:?set solrInit.solrHttpBase}"
    SHARDS="${SOLR_NUM_SHARDS:-1}"
    RF="${SOLR_REPLICATION_FACTOR:-2}"

    AUTH=()
    if [[ -n "${SOLR_ADMIN_USER:-}" && -n "${SOLR_ADMIN_PASSWORD:-}" ]]; then
      AUTH=(-u "${SOLR_ADMIN_USER}:${SOLR_ADMIN_PASSWORD}")
    fi

    echo "solr-init: waiting for Solr admin at ${BASE} ..."
    for _ in $(seq 1 90); do
      if curl -sfS "${AUTH[@]}" "${BASE}/solr/admin/info/system" >/dev/null 2>&1; then
        echo "solr-init: Solr is up"
        break
      fi
      sleep 2
    done
    if ! curl -sfS "${AUTH[@]}" "${BASE}/solr/admin/info/system" >/dev/null 2>&1; then
      echo "solr-init: timeout waiting for Solr" >&2
      exit 1
    fi

    # zk upconfig -d does not reliably use the mounted ConfigMap path; copy to a writable dir first.
    # Do not stage under $SOLR_HOME/server/solr/configsets (not writable when runAsNonRoot uid 1001).
    STAGING="/tmp/dataverse_zk_conf"
    rm -rf "${STAGING}"
    mkdir -p "${STAGING}"
    cp -aL "${CONF_DIR}/." "${STAGING}/"
    UPLOAD_DIR=""
    if [[ -f "${STAGING}/solrconfig.xml" ]]; then
      UPLOAD_DIR="${STAGING}"
    elif [[ -f "${STAGING}/conf/solrconfig.xml" ]]; then
      UPLOAD_DIR="${STAGING}/conf"
    else
      echo "solr-init: missing solrconfig.xml — ConfigMap must be the full Dataverse Solr conf directory, not schema.xml only." >&2
      echo "solr-init: See https://guides.dataverse.org/en/latest/installation/prerequisites.html#solr and ops/solr-init-setup.md" >&2
      echo "solr-init: Example: docker cp solr:/var/solr/data/dataverse/conf ./dv-solr-conf && ./ops/create-solr-conf-configmap.sh \"\$(pwd)/dv-solr-conf\" demo-dataverse-besties" >&2
      echo "solr-init: Staged files under ${STAGING}:" >&2
      find "${STAGING}" -type f 2>/dev/null | sort >&2 || ls -laR "${STAGING}" >&2 || true
      exit 1
    fi

    SOLR_HOME="$(cd "$(dirname "$SOLR_BIN")/.." && pwd)"
    echo "solr-init: uploading configset ${CONFIGSET} to ZK ${ZK} (from ${UPLOAD_DIR})"
    (cd "${SOLR_HOME}" && "$SOLR_BIN" zk upconfig -z "${ZK}" -n "${CONFIGSET}" -d "${UPLOAD_DIR}")

    echo "solr-init: checking collection ${COLLECTION}"
    LIST_JSON=$(curl -sfS "${AUTH[@]}" "${BASE}/solr/admin/collections?action=LIST")
    if echo "${LIST_JSON}" | grep -q "\"${COLLECTION}\""; then
      echo "solr-init: collection ${COLLECTION} already exists"
      exit 0
    fi

    echo "solr-init: creating collection ${COLLECTION} (shards=${SHARDS} replicas=${RF})"
    curl -sfS "${AUTH[@]}" \
      "${BASE}/solr/admin/collections?action=CREATE&name=${COLLECTION}&collection.configName=${CONFIGSET}&numShards=${SHARDS}&replicationFactor=${RF}"
    echo "solr-init: done"
{{- end }}
